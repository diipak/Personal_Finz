<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Merchant Rules Manager</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-3 sticky top-0 z-10">
<div class="flex items-center gap-8">
<div class="flex items-center gap-3">
<div class="bg-primary text-white p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-xl" data-icon="settings_ethernet">settings_ethernet</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Rules Engine</h2>
</div>
<div class="hidden md:flex items-center">
    <nav class="flex items-center gap-6 ml-8">
        <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="/">Dashboard</a>
        <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="/import-ui">Import Statement</a>
        <a class="text-sm font-bold text-primary" href="/rules">Rules Engine</a>
        <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="/review">Review</a>
    </nav>
</div>
</div>
<div class="flex items-center gap-4">
<button onclick="addRule()" class="flex items-center justify-center gap-2 rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold transition-colors hover:bg-primary/90">
<span class="material-symbols-outlined text-lg" data-icon="add">add</span>
<span class="truncate">Add Rule</span>
</button>
<div class="h-10 w-10 rounded-full border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
<img alt="User profile" class="h-full w-full object-cover" data-alt="User profile avatar circle" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvc-UVLXnPmWWk6r4TCezYE_uT53cwOfUG7eG2r8CkPXc5QVop14h0m9kpe3lvDKwbRRjLTXpMraEX3X1bka9gVH0G0GQH1Sv6v3AdttBKyzBm5LyT1cp2XymtfJR8ZZwd-_9NNOCwIMGNKzmfU7io7SLajqTo1SKQOeqJkViri3HUMMP4d09v8tIn8wQa1PpU_kmjVA5cM4KLtazXAhpTwXlhRAjz3tYTkCyniUhSy4A-otsFg7riDvWjx2QXtTgsqg1MpeMDbv4q"/>
</div>
</div>
</header>
<main class="flex-1 flex flex-col max-w-[1200px] mx-auto w-full px-6 py-8">
<!-- Page Header -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8">
<div class="flex flex-col gap-1">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Merchant Rules Manager</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Automate transaction categorization using pattern matching.</p>
</div>
<div class="flex items-center gap-2 text-sm text-slate-500">
<span class="material-symbols-outlined text-base" data-icon="info">info</span>
<span id="active-rules-count">0 active rules</span>
</div>
</div>
<!-- Table Container -->
<div class="bg-white dark:bg-background-dark rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800">
<th class="px-6 py-4 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-[40%]">Merchant Pattern</th>
<th class="px-6 py-4 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-[40%]">Category</th>
<th class="px-6 py-4 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-[20%] text-right">Actions</th>
</tr>
</thead>
<tbody id="rules-table-body" class="divide-y divide-slate-100 dark:divide-slate-800">
    <!-- Rules populated here -->
</tbody>
</table>
</div>
</div>
<div class="mt-4 flex justify-end">
    <button onclick="saveRules()" class="px-6 py-2 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600 transition-colors">Save Changes</button>
</div>
</main>

<script>
    let allRules = {};

    async function loadRules() {
        try {
            const response = await fetch('/api/rules');
            allRules = await response.json();
            renderRules();
        } catch (error) {
            console.error('Failed to load rules:', error);
        }
    }

    function renderRules() {
        const tableBody = document.getElementById('rules-table-body');
        tableBody.innerHTML = '';
        
        const merchants = allRules.merchant_categories || {};
        const merchantKeys = Object.keys(merchants).sort();

        merchantKeys.forEach(merchant => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors';
            row.innerHTML = `
                <td class="px-6 py-4">
                    <input type="text" value="${merchant}" class="bg-transparent border-none focus:ring-1 focus:ring-primary rounded px-2 py-1 w-full text-sm font-medium text-slate-900 dark:text-slate-100" onchange="updateMerchantName('${merchant}', this.value)" />
                </td>
                <td class="px-6 py-4">
                    <select class="bg-transparent border-none focus:ring-1 focus:ring-primary rounded px-2 py-1 w-full text-sm text-slate-600 dark:text-slate-300" onchange="updateCategory('${merchant}', this.value)">
                        ${['Groceries', 'Travel', 'Utilities', 'Subscription', 'Transfer', 'Shopping', 'Income', 'Dining', 'Fuel', 'Rent', 'Insurance', 'Transport', 'Entertainment', 'Other', 'Self Transfer'].map(cat => 
                            `<option value="${cat}" ${merchants[merchant] === cat ? 'selected' : ''}>${cat}</option>`
                        ).join('')}
                    </select>
                </td>
                <td class="px-6 py-4 text-right">
                    <button onclick="deleteRule('${merchant}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                        <span class="material-symbols-outlined text-xl">delete</span>
                    </button>
                </td>
            `;
            tableBody.appendChild(row);
        });

        document.getElementById('active-rules-count').textContent = `${merchantKeys.length} active rules`;
    }

    function updateMerchantName(oldName, newName) {
        if (oldName === newName) return;
        const category = allRules.merchant_categories[oldName];
        delete allRules.merchant_categories[oldName];
        allRules.merchant_categories[newName] = category;
        renderRules();
    }

    function updateCategory(merchant, newCategory) {
        allRules.merchant_categories[merchant] = newCategory;
    }

    function deleteRule(merchant) {
        if (confirm(`Delete rule for ${merchant}?`)) {
            delete allRules.merchant_categories[merchant];
            renderRules();
        }
    }

    function addRule() {
        const merchant = prompt("Enter merchant name pattern:");
        if (merchant) {
            if (!allRules.merchant_categories) allRules.merchant_categories = {};
            allRules.merchant_categories[merchant] = "Other";
            renderRules();
        }
    }

    async function saveRules() {
        try {
            const response = await fetch('/api/rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(allRules)
            });
            const result = await response.json();
            if (result.status === 'success') {
                alert('Rules saved successfully!');
            }
        } catch (error) {
            console.error('Failed to save rules:', error);
            alert('Failed to save rules');
        }
    }

    document.addEventListener('DOMContentLoaded', loadRules);
</script>
</div>
</div>
</body></html>
